<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Detroit Tigers Scoreboard</title>
<link rel="stylesheet" href="style.css?v=11">
</head>

<body>

<div class="container">
    
    <div id="scores">Loading Tigers...</div>
    <div id="nhl">Loading NHL...</div>
</div>

<script>
const TIGERS_TEAM_ID = 116;

function formatGameTime(gameDate) {
    const date = new Date(gameDate);
    return date.toLocaleTimeString([], {
        hour: 'numeric',
        minute: '2-digit'
    });
}

function formatGameDateAndTime(gameDate) {
    const date = new Date(gameDate);
    return date.toLocaleDateString([], {
        weekday: 'short',
        month: 'short',
        day: 'numeric'
    }) + ' at ' + date.toLocaleTimeString([], {
        hour: 'numeric',
        minute: '2-digit'
    });
}

function isSameLocalDay(dateA, dateB) {
    return dateA.getFullYear() === dateB.getFullYear() &&
           dateA.getMonth() === dateB.getMonth() &&
           dateA.getDate() === dateB.getDate();
}

function getDateString(date) {
    return date.toISOString().split('T')[0];
}

async function loadScores() {
    const today = new Date();

    const futureDate = new Date();
    futureDate.setDate(today.getDate() + 14);

    const startDate = getDateString(today);
    const endDate = getDateString(futureDate);

    const response = await fetch(
    `https://statsapi.mlb.com/api/v1/schedule?sportId=1&teamId=${TIGERS_TEAM_ID}&startDate=${startDate}&endDate=${endDate}&hydrate=linescore&_=${Date.now()}`,
    { cache: "no-store" }
);

    const data = await response.json();
    const games = data.dates.flatMap(date => date.games);

    const nextGame = games.find(game => {
        const status = game.status.detailedState;
        return status !== "Final" &&
               status !== "Game Over" &&
               status !== "Completed Early";
    });

    if (!nextGame) {
        document.getElementById('scores').innerHTML =
            `<div class="no-game">No Upcoming Tigers Game</div>`;
        return;
    }

    const game = nextGame;

    const away = game.teams.away.team.name;
    const home = game.teams.home.team.name;

    const awayId = game.teams.away.team.id;
    const homeId = game.teams.home.team.id;

    const awayLogo = `https://www.mlbstatic.com/team-logos/${awayId}.svg`;
    const homeLogo = `https://www.mlbstatic.com/team-logos/${homeId}.svg`;

    const awayScore = game.teams.away.score ?? '-';
    const homeScore = game.teams.home.score ?? '-';

   
    const linescore = game.linescore || {};
    const outs = linescore.outs ?? 0;

    let gameDetails = status;
    let subStatus = '';

    const gameDate = new Date(game.gameDate);
    const status = game.status.detailedState;
    const isLive = game.status.abstractGameState === "Live";




const gameDate = new Date(game.gameDate);

    if (isLive) {
    let inningArrow = "▲";

    if (linescore.inningState === "Bottom") {
        inningArrow = "▼";
    }

    gameDetails = `${inningArrow} ${linescore.currentInning}`;
} else if (status === "Scheduled" || status === "Pre-Game" || status === "Warmup") {
    gameDetails = "Upcoming";

    if (isSameLocalDay(gameDate, today)) {
        subStatus = formatGameTime(game.gameDate);
    } else {
        subStatus = formatGameDateAndTime(game.gameDate);
    }
}

    document.getElementById('scores').innerHTML = `
        <div class="game">

            <div class="team-row">
                <div class="team-info">
                    <img class="team-logo" src="${awayLogo}" alt="${away}">
                    <span class="team-name">${away}</span>
                </div>
                <span class="score">${awayScore}</span>
            </div>

            <div class="team-row">
                <div class="team-info">
                    <img class="team-logo" src="${homeLogo}" alt="${home}">
                    <span class="team-name">${home}</span>
                </div>
                <span class="score">${homeScore}</span>
            </div>

            <div class="status">${gameDetails}</div>

            ${subStatus ? `<div class="sub-status">${subStatus}</div>` : ''}

            ${isLive ? `
            <div class="game-state">

                <div class="bases">
                    <div class="base second ${linescore?.offense?.second ? 'on' : ''}"></div>
                    <div class="base third ${linescore?.offense?.third ? 'on' : ''}"></div>
                    <div class="base first ${linescore?.offense?.first ? 'on' : ''}"></div>
                </div>

                <div class="outs">
                    <span class="out-circle ${outs >= 1 ? 'on' : ''}"></span>
                    <span class="out-circle ${outs >= 2 ? 'on' : ''}"></span>
                    <span class="out-circle ${outs >= 3 ? 'on' : ''}"></span>
                </div>

            </div>
            ` : ''}

        </div>
    `;
}

    function getOrdinal(number) {
    if (number === 1) return "st";
    if (number === 2) return "nd";
    if (number === 3) return "rd";
    return "th";
}
    
async function loadNHL() {
    try {
        const response = await fetch(
            "https://site.api.espn.com/apis/site/v2/sports/hockey/nhl/scoreboard?_=" + Date.now(),
            { cache: "no-store" }
        );

        if (!response.ok) {
            throw new Error("HTTP " + response.status);
        }

        const data = await response.json();

        const playoffGames = data.events || [];

        if (playoffGames.length === 0) {
            document.getElementById("nhl").innerHTML =
                `<div class="game nhl-game">
                    <div class="section-title">STANLEY CUP PLAYOFFS</div>
                    <div class="no-game">No NHL Game Found</div>
                </div>`;
            return;
        }

        const game = playoffGames[0];
        const competition = game.competitions[0];
        const teams = competition.competitors;

        const awayTeam = teams.find(t => t.homeAway === "away");
        const homeTeam = teams.find(t => t.homeAway === "home");

        const away = awayTeam.team.shortDisplayName;
        const home = homeTeam.team.shortDisplayName;

        const awayScore = awayTeam.score || "-";
        const homeScore = homeTeam.score || "-";

        const awayLogo = awayTeam.team.logo || "";
        const homeLogo = homeTeam.team.logo || "";

        let status = competition.status.type.shortDetail || game.status.type.description;

        document.getElementById("nhl").innerHTML = `
            <div class="game nhl-game">
                <div class="section-title">STANLEY CUP PLAYOFFS</div>

                <div class="team-row">
                    <div class="team-info">
                        <img class="team-logo" src="${awayLogo}" alt="${away}">
                        <span class="team-name">${away}</span>
                    </div>
                    <span class="score">${awayScore}</span>
                </div>

                <div class="team-row">
                    <div class="team-info">
                        <img class="team-logo" src="${homeLogo}" alt="${home}">
                        <span class="team-name">${home}</span>
                    </div>
                    <span class="score">${homeScore}</span>
                </div>

                <div class="status">${status}</div>
            </div>
        `;

    } catch (error) {
        document.getElementById("nhl").innerHTML =
            `<div class="game nhl-game">
                <div class="section-title">STANLEY CUP PLAYOFFS</div>
                <div class="no-game">Unable to load NHL scores</div>
                <div class="sub-status">${error.message}</div>
            </div>`;
    }
}






    
loadScores();
loadNHL();

setInterval(() => {
    loadScores();
    loadNHL();
}, 10000);
</script>

</body>
</html>
