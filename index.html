<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detroit Tigers Scoreboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>DETROIT TIGERS</h1>
        <div id="scores">Loading...</div>
    </div>

    <script>
        async function loadScores() {

            const today = new Date().toISOString().split('T')[0];

            const response = await fetch(
                `https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${today}&hydrate=linescore`
            );

            const data = await response.json();

            let html = '';

            const tigersGames = data.dates[0]?.games.filter(game =>
                game.teams.home.team.name === "Detroit Tigers" ||
                game.teams.away.team.name === "Detroit Tigers"
            );

            if (!tigersGames || tigersGames.length === 0) {

                html = `
                    <div class="no-game">
                        No Tigers Game Today
                    </div>
                `;

            } else {

                tigersGames.forEach(game => {

                    const away = game.teams.away.team.name;
                    const home = game.teams.home.team.name;

                    const awayScore = game.teams.away.score ?? '-';
                    const homeScore = game.teams.home.score ?? '-';

                    const status = game.status.detailedState;

                    const linescore = game.linescore || {};

                    const outs = linescore.outs ?? 0;

                    let gameDetails = status;

                    if (status === "In Progress") {

                        gameDetails =
                            `${linescore.inningState} ${linescore.currentInning}`;
                    }

                    html += `
                        <div class="game">

                            <div class="teams">

                                <div class="team-row">
                                    <span class="team-name">${away}</span>
                                    <span class="score">${awayScore}</span>
                                </div>

                                <div class="team-row">
                                    <span class="team-name">${home}</span>
                                    <span class="score">${homeScore}</span>
                                </div>

                            </div>

                            <div class="status">
                                ${gameDetails}
                            </div>

                            ${status === "In Progress" ? `
                            <div class="game-state">

                                <div class="bases">

                                    <div class="base second ${linescore?.offense?.second ? 'on' : ''}"></div>

                                    <div class="base third ${linescore?.offense?.third ? 'on' : ''}"></div>

                                    <div class="base first ${linescore?.offense?.first ? 'on' : ''}"></div>

                                </div>

                                <div class="outs">

                                    <span class="out-circle ${outs >= 1 ? 'on' : ''}"></span>

                                    <span class="out-circle ${outs >= 2 ? 'on' : ''}"></span>

                                    <span class="out-circle ${outs >= 3 ? 'on' : ''}"></span>

                                </div>

                            </div>
                            ` : ''}

                        </div>
                    `;
                });
            }

            document.getElementById('scores').innerHTML = html;
        }

        loadScores();

        setInterval(loadScores, 60000);
    </script>

</body>
</html>
